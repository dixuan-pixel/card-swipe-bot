services:
  - type: web
    name: card-swipe-bot
    env: docker
    plan: free
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DINGTALK_APP_KEY
        sync: false
      - key: DINGTALK_APP_SECRET
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: CONVERSATION_TITLE
        value: 刷卡
      - key: CONVERSATION_ID
        sync: false
      - key: PORT
        value: 8080
